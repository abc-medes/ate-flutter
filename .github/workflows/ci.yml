name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # `.env` is declared as an asset (loaded at runtime via flutter_dotenv) but
      # is gitignored, so create an empty placeholder for the asset bundle build.
      - name: Create placeholder .env
        run: touch .env

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

  analyze:
    name: Analyze (advisory)
    runs-on: ubuntu-latest
    # Static analysis is advisory while the codebase adopts stricter lints; the
    # `test` job above is the gating check.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create placeholder .env
        run: touch .env

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze
